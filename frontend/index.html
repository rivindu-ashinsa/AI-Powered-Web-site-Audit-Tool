<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Website Audit Tool</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-slate-950 text-slate-100">
  <div class="absolute inset-0 -z-10 bg-[radial-gradient(circle_at_20%_20%,#0f766e_0%,transparent_40%),radial-gradient(circle_at_80%_0%,#1d4ed8_0%,transparent_35%),linear-gradient(#020617,#0f172a)]"></div>

  <main class="max-w-6xl mx-auto px-4 py-10">
    <section class="rounded-3xl border border-slate-700/60 bg-slate-900/70 backdrop-blur p-6 md:p-8 shadow-2xl">
      <p class="inline-flex items-center gap-2 rounded-full border border-cyan-400/40 bg-cyan-400/10 px-3 py-1 text-xs tracking-wide uppercase text-cyan-300">Static Frontend</p>
      <h1 class="text-3xl md:text-4xl font-black mt-4 text-white">AI Website Audit Tool</h1>
      <p class="text-slate-300 mt-3 max-w-2xl">Enter a URL and get audit metrics, AI insights, and prioritized recommendations from the backend API.</p>

      <div class="rounded-2xl border border-slate-700/70 bg-slate-950/50 p-4 md:p-5 mt-6">
        <label for="urlInput" class="block text-sm font-semibold text-slate-200 mb-2">Website URL</label>
        <div class="grid grid-cols-1 md:grid-cols-[1fr_auto] gap-3">
          <input id="urlInput" class="w-full p-3 rounded-xl border border-slate-600 bg-slate-900 text-slate-100 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-cyan-400" type="url" placeholder="https://example.com">
          <button id="analyzeBtn" class="px-6 py-3 rounded-xl font-semibold text-slate-950 bg-gradient-to-r from-cyan-300 to-blue-300 hover:from-cyan-200 hover:to-blue-200 disabled:opacity-60 disabled:cursor-not-allowed">Analyze</button>
        </div>
        <div id="loadingWrap" class="hidden mt-4 flex items-center gap-3 text-cyan-300">
          <div class="h-4 w-4 rounded-full border-2 border-cyan-400 border-t-transparent animate-spin"></div>
          <p class="text-sm">Analyzing... Please wait.</p>
        </div>
        <p id="errorText" class="text-rose-400 text-sm mt-4 hidden"></p>
      </div>
    </section>

    <section id="results" class="mt-8 space-y-6 hidden">
      <div class="rounded-2xl border border-slate-700/60 bg-slate-900/70 p-5 md:p-6">
        <h2 class="text-2xl font-bold text-white mb-4">Metrics</h2>
        <div id="metricsGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4"></div>
      </div>

      <div class="rounded-2xl border border-slate-700/60 bg-slate-900/70 p-5 md:p-6">
        <h2 class="text-2xl font-bold text-white mb-4">AI Insights</h2>
        <div id="insightsGrid" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
      </div>

      <div class="rounded-2xl border border-slate-700/60 bg-slate-900/70 p-5 md:p-6">
        <h2 class="text-2xl font-bold text-white mb-4">Recommendations</h2>
        <div id="recommendationsList" class="space-y-4"></div>
      </div>
    </section>
  </main>

  <script src="./script.js"></script>
</body>
</html>
